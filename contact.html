<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Thunderbolt</title>
  <meta name="description" content="Contactez Thunderbolt — une question sur la casquette, une commande, une collab.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- HEADER -->
  <header class="site-head">
    <div class="wrap nav">
      <a href="index.html" class="brand">
        <span class="bolt bolt-pulse" aria-hidden="true">
          <svg width="22" height="22" viewBox="0 0 24 24"><path d="M13 1 L4 13 L10 13 L9 23 L20 9 L13 9 Z" fill="#FFD15C" stroke="#161310" stroke-width="1.4" stroke-linejoin="round"/></svg>
        </span>
        Thunderbolt
      </a>
      <button class="burger" aria-label="Menu" aria-expanded="false"><span></span><span></span><span></span></button>
      <nav class="nav-links">
        <a href="index.html">Accueil</a>
        <a href="casquette.html">La casquette</a>
        <a href="contact.html" class="active">Contact</a>
        <a href="casquette.html" class="nav-shop">Shop</a>
      </nav>
    </div>
  </header>

  <!-- CONTACT -->
  <section class="bg-blanc">
    <div class="wrap">
      <p class="eyebrow" style="color:var(--orange);">Une question ? ⚡</p>
      <h2 class="display" style="margin-bottom:36px;">Écris-nous</h2>

      <div class="contact-grid">
        <!-- INFOS -->
        <div class="contact-info">
          <p style="font-weight:500;max-width:38ch;">
            Une question sur la casquette, une commande, une idée de collab ?
            On répond vite.
          </p>
          <p style="margin-top:20px;">
            <!-- 👉 Mets ton vrai mail ici -->
            <a class="mail" href="mailto:contact@thunderbolt.store">contact@thunderbolt.store</a>
          </p>

          <div class="socials">
            <!-- 👉 Mets tes vrais liens réseaux ici -->
            <a href="#" aria-label="Instagram"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg></a>
            <a href="#" aria-label="TikTok"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M15 4v8.5a4 4 0 11-3-3.9" stroke-linecap="round" stroke-linejoin="round"/><path d="M15 4a4.5 4.5 0 004.5 4.5" stroke-linecap="round" stroke-linejoin="round"/></svg></a>
          </div>
        </div>

        <!-- FORMULAIRE -->
        <!-- ================================================================
             FORMULAIRE
             Site statique → pas de serveur. Pour recevoir les messages :
             1) crée un compte gratuit Formspree (formspree.io)
             2) remplace l'URL d'action ci-dessous par ton endpoint
             OU laisse-le tel quel : il bascule en mailto automatiquement.
        ================================================================= -->
        <form action="https://formspree.io/f/TON_ID" method="POST" id="contactForm">
          <div class="field">
            <label for="nom">Nom</label>
            <input type="text" id="nom" name="nom" required>
          </div>
          <div class="field">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
          </div>
          <div class="field">
            <label for="message">Message</label>
            <textarea id="message" name="message" required></textarea>
          </div>
          <button type="submit" class="btn btn-primary">Envoyer le message</button>
        </form>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="site-foot">
    <div class="wrap">
      <div class="foot-grid">
        <div class="foot-brand">
          <span class="bolt" aria-hidden="true"><svg width="26" height="26" viewBox="0 0 24 24"><path d="M13 1 L4 13 L10 13 L9 23 L20 9 L13 9 Z" fill="#FBB016" stroke="#FFFFFF" stroke-width="1.2" stroke-linejoin="round"/></svg></span>
          Thunderbolt
        </div>
        <div class="foot-links">
          <a href="index.html">Accueil</a>
          <a href="casquette.html">La casquette</a>
          <a href="contact.html">Contact</a>
        </div>
      </div>
      <p class="foot-note">© 2026 Thunderbolt — <span class="foot-store">thunderbolt.store</span> · Brodé en France ⚡</p>
    </div>
  </footer>

  <script src="script.js"></script>
  <script>
    // Repli mailto si l'endpoint Formspree n'est pas encore configuré
    (function () {
      var form = document.getElementById("contactForm");
      if (!form) return;
      if (form.action.indexOf("TON_ID") !== -1) {
        form.addEventListener("submit", function (e) {
          e.preventDefault();
          var nom = encodeURIComponent(form.nom.value);
          var msg = encodeURIComponent(form.message.value + "\n\n— " + form.nom.value + " (" + form.email.value + ")");
          window.location.href = "mailto:contact@thunderbolt.store?subject=Contact site — " + nom + "&body=" + msg;
        });
      }
    })();
  </script>
</body>
</html>
