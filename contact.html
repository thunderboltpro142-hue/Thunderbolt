<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Thunderbolt</title>
  <meta name="description" content="Contactez Thunderbolt — une question sur la casquette, une commande, une collab.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- HEADER -->
  <header class="site-head">
    <div class="wrap nav">
      <a href="index.html" class="brand">
        <span class="bolt" aria-hidden="true">
          <svg width="20" height="20" viewBox="0 0 24 24"><defs><linearGradient id="g1" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#FF6A1A"/><stop offset="1" stop-color="#FFC400"/></linearGradient></defs><path d="M13 1 L4 13 L10 13 L9 23 L20 9 L13 9 Z" fill="url(#g1)"/></svg>
        </span>
        Thunderbolt
      </a>
      <button class="burger" aria-label="Menu" aria-expanded="false"><span></span><span></span><span></span></button>
      <nav class="nav-links">
        <a href="index.html">Accueil</a>
        <a href="casquette.html">La casquette</a>
        <a href="contact.html" class="active">Contact</a>
        <a href="casquette.html" class="nav-shop">Boutique</a>
      </nav>
    </div>
  </header>

  <!-- CONTACT -->
  <section>
    <div class="wrap contact-grid">
      <!-- INFOS -->
      <div class="contact-info">
        <span class="eyebrow"><span class="dot"></span>Contact</span>
        <h1>Une question&nbsp;?<br>Écris-nous.</h1>
        <hr class="rule">
        <p>Casquette, commande, idée de collab — on répond vite.</p>

        <!-- 👉 Mets ton vrai mail ici quand tu l'as -->
        <a class="mail" href="mailto:contact@thunderbolt.store">contact@thunderbolt.store</a>

        <div class="socials">
          <a href="https://www.instagram.com/thunderbolt31177/" target="_blank" rel="noopener" aria-label="Instagram">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>
          </a>
          <a href="https://www.tiktok.com/@thunderbolt_off" target="_blank" rel="noopener" aria-label="TikTok">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M15 4v8.5a4 4 0 11-3-3.9" stroke-linecap="round" stroke-linejoin="round"/><path d="M15 4a4.5 4.5 0 004.5 4.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </a>
          <!-- 👉 X : mets ton lien quand le compte existe -->
          <a href="#" aria-label="X">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.24 2.25h3.31l-7.23 8.26 8.5 11.24h-6.66l-5.21-6.82-5.97 6.82H1.68l7.73-8.84L1.25 2.25H8.08l4.71 6.23 5.45-6.23Zm-1.16 17.52h1.83L7.08 4.13H5.12l11.96 15.64Z"/></svg>
          </a>
        </div>
      </div>

      <!-- FORMULAIRE -->
      <!-- ================================================================
           FORMULAIRE — site statique, pas de serveur.
           Pour recevoir les messages : crée un compte gratuit Formspree
           (formspree.io) et remplace TON_ID ci-dessous par ton endpoint.
           Tant que c'est "TON_ID", le bouton bascule en mailto automatiquement.
      ================================================================= -->
      <form class="form" action="https://formspree.io/f/TON_ID" method="POST" id="contactForm">
        <div class="field">
          <label for="nom">Nom</label>
          <input type="text" id="nom" name="nom" required>
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required>
        </div>
        <div class="field">
          <label for="message">Message</label>
          <textarea id="message" name="message" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Envoyer le message
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 6l6 6-6 6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </form>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="site-foot">
    <div class="wrap">
      <div class="foot-grid">
        <div class="foot-brand">
          <span class="bolt" aria-hidden="true"><svg width="24" height="24" viewBox="0 0 24 24"><defs><linearGradient id="g2" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#FF6A1A"/><stop offset="1" stop-color="#FFC400"/></linearGradient></defs><path d="M13 1 L4 13 L10 13 L9 23 L20 9 L13 9 Z" fill="url(#g2)"/></svg></span>
          Thunderbolt
        </div>
        <div class="foot-links">
          <a href="index.html">Accueil</a>
          <a href="casquette.html">La casquette</a>
          <a href="contact.html">Contact</a>
        </div>
      </div>
      <p class="foot-note">© 2026 Thunderbolt — <span class="store">thunderbolt.store</span> · Brodé en France</p>
    </div>
  </footer>

  <script src="script.js"></script>
  <script>
    (function () {
      var form = document.getElementById("contactForm");
      if (!form) return;
      if (form.action.indexOf("TON_ID") !== -1) {
        form.addEventListener("submit", function (e) {
          e.preventDefault();
          var nom = encodeURIComponent(form.nom.value);
          var msg = encodeURIComponent(form.message.value + "\n\n— " + form.nom.value + " (" + form.email.value + ")");
          window.location.href = "mailto:contact@thunderbolt.store?subject=Contact site — " + nom + "&body=" + msg;
        });
      }
    })();
  </script>
</body>
</html>
